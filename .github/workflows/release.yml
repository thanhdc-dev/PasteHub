name: Release PasteHub

# Chạy khi bạn push 1 tag dạng v1.0.1
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ---- BUILD ----
      - name: Build app (Release, unsigned/ad-hoc)
        run: |
          xcodebuild -project PasteHub.xcodeproj \
            -scheme PasteHub \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip the .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent PasteHub.app "PasteHub-${VERSION}.zip"
          mv "PasteHub-${VERSION}.zip" "${GITHUB_WORKSPACE}/"

      # ---- TẢI SPARKLE TOOLS (generate_keys / sign_update / generate_appcast) ----
      - name: Download Sparkle tools
        run: |
          curl -L -o sparkle-tools.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-for-Swift-Package-Manager.zip \
            || curl -L -o sparkle-tools.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.6.4.tar.xz
          mkdir -p sparkle-tools
          tar -xf sparkle-tools.tar.xz -C sparkle-tools --strip-components=1 || unzip -o sparkle-tools.tar.xz -d sparkle-tools

      # ---- KÝ FILE ZIP ----
      # SPARKLE_PRIVATE_KEY: lưu trong GitHub Secrets, dạng base64 của private key EdDSA
      - name: Sign update with Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$SPARKLE_PRIVATE_KEY" | base64 --decode > private_key.pem
          SIGNATURE=$(./sparkle-tools/bin/sign_update "PasteHub-${VERSION}.zip" -f private_key.pem)
          echo "SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          rm private_key.pem

      # ---- TẠO GITHUB RELEASE + UPLOAD FILE ZIP ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PasteHub-*.zip
          generate_release_notes: true

      # ---- CẬP NHẬT appcast.xml VÀ PUSH LÊN NHÁNH gh-pages ----
      - name: Update appcast.xml and publish to gh-pages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILESIZE=$(stat -f%z "PasteHub-${VERSION}.zip")
          REPO="${GITHUB_REPOSITORY}"

          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout -b gh-pages

          # Thêm item mới vào đầu appcast.xml (script python đơn giản để không phá format XML)
          python3 - <<EOF
          import re

          new_item = """        <item>
              <title>Version ${VERSION}</title>
              <sparkle:releaseNotesLink>
                  https://github.com/${REPO}/releases/tag/v${VERSION}
              </sparkle:releaseNotesLink>
              <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S +0000")</pubDate>
              <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure
                  url="https://github.com/${REPO}/releases/download/v${VERSION}/PasteHub-${VERSION}.zip"
                  sparkle:edSignature="${{ env.SIGNATURE }}"
                  length="${FILESIZE}"
                  type="application/octet-stream" />
          </item>
          """

          with open("appcast.xml", "r") as f:
              content = f.read()

          content = content.replace("<channel>", "<channel>\n" + new_item, 1)

          with open("appcast.xml", "w") as f:
              f.write(content)
          EOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v${VERSION}"
          git push origin gh-pages

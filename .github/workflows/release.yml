name: Release PasteHub

# Chạy khi bạn push 1 tag dạng v1.0.1, hoặc chạy thử thủ công qua tab Actions
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      test_version:
        description: "Version giả để test (không tạo tag/release thật, chỉ build thử)"
        required: true
        default: "0.0.1-test"

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      APP_NAME: PasteHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      # ---- CÀI CREATE-DMG ----
      # Không có sẵn trên runner macos-15, cần cài qua Homebrew (đã có sẵn trên runner)
      - name: Install create-dmg
        run: brew install create-dmg

      # ---- BUILD + ĐÓNG GÓI DMG ----
      # Dùng chính script scripts/build-dmg.sh — đảm bảo output CI giống hệt build local.
      # Biến CI=true (GitHub Actions tự set sẵn) khiến script thêm cờ --skip-jenkins,
      # bỏ qua bước create-dmg customize Finder qua AppleScript (nguồn lỗi phổ biến trên
      # máy ảo headless không có phiên Finder tương tác ổn định).
      - name: Build DMG via build-dmg.sh (với retry)
        working-directory: scripts
        run: |
          chmod +x build-dmg.sh

          MAX_RETRIES=2
          attempt=1

          until ./build-dmg.sh; do
            if [ "$attempt" -gt "$MAX_RETRIES" ]; then
              echo "❌ Build DMG thất bại sau $((MAX_RETRIES + 1)) lần thử"
              exit 1
            fi

            echo "⚠️  Build DMG thất bại (lần $attempt) — dọn dẹp và thử lại..."

            # Dọn các volume dmg tạm còn mount dở (nguyên nhân phổ biến gây lỗi
            # "Resource busy" ở lần thử tiếp theo)
            for vol in "/Volumes/PasteHub Installer"*; do
              if [ -d "$vol" ]; then
                echo "  Unmounting $vol"
                hdiutil detach "$vol" -force || true
              fi
            done

            # Xoá dmg dở dang nếu có, để build-dmg.sh không bị vướng file cũ
            rm -f ../build/PasteHub-Installer-*.dmg || true

            attempt=$((attempt + 1))
            sleep 10
          done

      - name: Locate built DMG and read version
        id: dmg
        run: |
          DMG_PATH=$(find build/Build -maxdepth 1 -name "${APP_NAME}-Installer-*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            # build-dmg.sh đặt output ở ../build từ trong scripts/, tức build/ ở root repo
            DMG_PATH=$(find . -maxdepth 2 -name "${APP_NAME}-Installer-*.dmg" | head -n 1)
          fi
          if [ -z "$DMG_PATH" ]; then
            echo "❌ Không tìm thấy file .dmg sau khi build"
            exit 1
          fi
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"
          echo "✅ Tìm thấy: $DMG_PATH"

      # ---- TẢI SPARKLE TOOLS (generate_keys / sign_update / generate_appcast) ----
      - name: Download Sparkle tools
        run: |
          set -euo pipefail

          # Xác định tag mới nhất qua redirect của /releases/latest
          LATEST_URL=$(curl -sIL -o /dev/null -w '%{url_effective}' \
            "https://github.com/sparkle-project/Sparkle/releases/latest")
          TAG="${LATEST_URL##*/}"
          echo "🔎 Sparkle version mới nhất: $TAG"

          curl -fSL -o sparkle-tools.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${TAG}/Sparkle-${TAG}.tar.xz"

          mkdir -p sparkle-tools
          tar -xf sparkle-tools.tar.xz -C sparkle-tools

          if [ ! -x sparkle-tools/bin/sign_update ]; then
            echo "❌ Không tìm thấy sparkle-tools/bin/sign_update sau khi giải nén"
            find sparkle-tools -maxdepth 2
            exit 1
          fi
          echo "✅ sign_update sẵn sàng tại sparkle-tools/bin/sign_update"

      # ---- KÝ FILE DMG ----
      # SPARKLE_PRIVATE_KEY: lưu trong GitHub Secrets, dạng base64 của private key EdDSA
      - name: Sign update with Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" | base64 --decode > private_key.pem
          SIGNATURE=$(./sparkle-tools/bin/sign_update "${{ steps.dmg.outputs.path }}" -f private_key.pem)
          echo "SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          rm private_key.pem

      # ---- TẠO GITHUB RELEASE + UPLOAD FILE DMG ----
      # Chỉ tạo Release thật khi trigger bằng push tag — chạy test thủ công (workflow_dispatch)
      # sẽ dừng lại ở đây, không publish gì lên GitHub, tránh tạo rác release/tag ảo.
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true

      # ---- CẬP NHẬT appcast.xml VÀ PUSH LÊN NHÁNH gh-pages ----
      # Cũng chỉ chạy khi push tag thật, cùng lý do như trên.
      - name: Update appcast.xml and publish to gh-pages
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_FILENAME="${{ steps.dmg.outputs.filename }}"
          FILESIZE=$(stat -f%z "${{ steps.dmg.outputs.path }}")
          REPO="${GITHUB_REPOSITORY}"

          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout -b gh-pages

          # Thêm item mới vào đầu appcast.xml (script python đơn giản để không phá format XML)
          python3 - <<EOF
          import re

          new_item = """        <item>
              <title>Version ${VERSION}</title>
              <sparkle:releaseNotesLink>
                  https://github.com/${REPO}/releases/tag/v${VERSION}
              </sparkle:releaseNotesLink>
              <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S +0000")</pubDate>
              <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure
                  url="https://github.com/${REPO}/releases/download/v${VERSION}/${DMG_FILENAME}"
                  sparkle:edSignature="${{ env.SIGNATURE }}"
                  length="${FILESIZE}"
                  type="application/x-apple-diskimage" />
          </item>
          """

          with open("appcast.xml", "r") as f:
              content = f.read()

          content = content.replace("<channel>", "<channel>\n" + new_item, 1)

          with open("appcast.xml", "w") as f:
              f.write(content)
          EOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v${VERSION}"
          git push origin gh-pages